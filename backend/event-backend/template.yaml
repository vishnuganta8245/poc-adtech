AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Event Pipeline (FINAL - 2 TABLE ARCHITECTURE)

#  GLOBAL CORS
Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Resources:

# ─────────────────────────────────────────────
#  Kinesis Stream
# ─────────────────────────────────────────────
  EventStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: event-stream
      StreamModeDetails:
        StreamMode: ON_DEMAND

# ─────────────────────────────────────────────
#  Producer Lambda (API → Kinesis)
# ─────────────────────────────────────────────
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: producer.handler
      Runtime: nodejs18.x
      MemorySize: 512
      Timeout: 10

      Environment:
        Variables:
          STREAM_NAME: !Ref EventStream

      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - kinesis:PutRecords
              Resource: !GetAtt EventStream.Arn

      Events:
        Api:
          Type: Api
          Properties:
            Path: /events
            Method: POST

# ─────────────────────────────────────────────
#  Consumer Lambda (Kinesis → DynamoDB + S3)
# ─────────────────────────────────────────────
  EventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambdaHandler
      Runtime: nodejs18.x
      MemorySize: 512
      Timeout: 30

      Environment:
        Variables:
          TABLE_NAME: !Ref MetricsTable
          DIM_TABLE: !Ref DimensionsTable
          BUCKET_NAME: !Ref EventStorageBucket
          CONNECTIONS_TABLE: !Ref ConnectionsTable
          WS_ENDPOINT: !Sub "${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

      Policies:
        # Metrics Table
        - DynamoDBCrudPolicy:
            TableName: !Ref MetricsTable

        # Dimensions Table
        - DynamoDBCrudPolicy:
            TableName: !Ref DimensionsTable

        # S3 Access
        - S3CrudPolicy:
            BucketName: !Ref EventStorageBucket

        # Kinesis Read
        - Statement:
            - Effect: Allow
              Action:
                - kinesis:GetRecords
                - kinesis:GetShardIterator
                - kinesis:DescribeStream
              Resource: !GetAtt EventStream.Arn

        # WebSocket push
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

      Events:
        KinesisStream:
          Type: Kinesis
          Properties:
            Stream: !GetAtt EventStream.Arn
            StartingPosition: LATEST
            BatchSize: 100
            MaximumBatchingWindowInSeconds: 0
            BisectBatchOnFunctionError: true

# ─────────────────────────────────────────────
#  Metrics Lambda (Dashboard API)
# ─────────────────────────────────────────────
  MetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: metrics.lambdaHandler
      Runtime: nodejs18.x
      MemorySize: 512
      Timeout: 10

      Environment:
        Variables:
          TABLE_NAME: !Ref MetricsTable
          DIM_TABLE: !Ref DimensionsTable

      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MetricsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DimensionsTable

      Events:
        Api:
          Type: Api
          Properties:
            Path: /metrics
            Method: GET

# ─────────────────────────────────────────────
#  Metrics Table (AGGREGATED COUNTS)
# ─────────────────────────────────────────────
  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: event-metrics-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

# ─────────────────────────────────────────────
#  Dimensions Table (GEO / USER / DEVICE)
# ─────────────────────────────────────────────
  DimensionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: event-dimensions-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

# ─────────────────────────────────────────────
#  S3 Bucket (RAW EVENTS BACKUP) FIX ADDED
# ─────────────────────────────────────────────
  EventStorageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

# ─────────────────────────────────────────────
#  WebSocket Infrastructure
# ─────────────────────────────────────────────
  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-ws-connections"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-ws"
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    DependsOn: EventFunction
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${EventFunction.Arn}/invocations"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub "integrations/${WebSocketIntegration}"

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub "integrations/${WebSocketIntegration}"

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: Prod
      AutoDeploy: true

  WebSocketPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EventFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

# ─────────────────────────────────────────────
#  S3 + CloudFront — Event Generator
# ─────────────────────────────────────────────
  EventGeneratorBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub "${AWS::StackName}-event-generator-${AWS::AccountId}"

  EventGeneratorBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EventGeneratorBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${EventGeneratorBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${EventGeneratorDistribution}"

  EventGeneratorOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-generator-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  EventGeneratorDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        Origins:
          - Id: GeneratorS3Origin
            DomainName: !GetAtt EventGeneratorBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt EventGeneratorOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: GeneratorS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

# ─────────────────────────────────────────────
#  S3 + CloudFront — Event Dashboard
# ─────────────────────────────────────────────
  EventDashboardBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub "${AWS::StackName}-event-dashboard-${AWS::AccountId}"

  EventDashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EventDashboardBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${EventDashboardBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${EventDashboardDistribution}"

  EventDashboardOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-dashboard-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  EventDashboardDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        Origins:
          - Id: DashboardS3Origin
            DomainName: !GetAtt EventDashboardBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt EventDashboardOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: DashboardS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

# ─────────────────────────────────────────────
#  OUTPUTS
# ─────────────────────────────────────────────
Outputs:
  EventsApi:
    Description: "POST events"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/events"

  MetricsApi:
    Description: "GET dashboard metrics"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/metrics"

  EventGeneratorURL:
    Description: "Event Generator (CloudFront)"
    Value: !Sub "https://${EventGeneratorDistribution.DomainName}"

  EventGeneratorBucketName:
    Description: "S3 bucket for Event Generator"
    Value: !Ref EventGeneratorBucket

  EventDashboardURL:
    Description: "Event Dashboard (CloudFront)"
    Value: !Sub "https://${EventDashboardDistribution.DomainName}"

  EventDashboardBucketName:
    Description: "S3 bucket for Event Dashboard"
    Value: !Ref EventDashboardBucket

  WebSocketURL:
    Description: "WebSocket URL for dashboard"
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"