AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Event Pipeline (FINAL - 2 TABLE ARCHITECTURE)

# 🌐 GLOBAL CORS
Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Resources:

# ─────────────────────────────────────────────
# 🌊 Kinesis Stream
# ─────────────────────────────────────────────
  EventStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: event-stream
      StreamModeDetails:
        StreamMode: ON_DEMAND

# ─────────────────────────────────────────────
# 🚀 Producer Lambda (API → Kinesis)
# ─────────────────────────────────────────────
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: producer.handler
      Runtime: nodejs18.x
      MemorySize: 512
      Timeout: 10

      Environment:
        Variables:
          STREAM_NAME: !Ref EventStream

      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - kinesis:PutRecords
              Resource: !GetAtt EventStream.Arn

      Events:
        Api:
          Type: Api
          Properties:
            Path: /events
            Method: POST

# ─────────────────────────────────────────────
# ⚙️ Consumer Lambda (Kinesis → DynamoDB + S3)
# ─────────────────────────────────────────────
  EventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambdaHandler
      Runtime: nodejs18.x
      MemorySize: 512
      Timeout: 30

      Environment:
        Variables:
          TABLE_NAME: !Ref MetricsTable
          DIM_TABLE: !Ref DimensionsTable
          BUCKET_NAME: !Ref EventStorageBucket

      Policies:
        # Metrics Table
        - DynamoDBCrudPolicy:
            TableName: !Ref MetricsTable

        # Dimensions Table
        - DynamoDBCrudPolicy:
            TableName: !Ref DimensionsTable

        # S3 Access
        - S3CrudPolicy:
            BucketName: !Ref EventStorageBucket

        # Kinesis Read
        - Statement:
            - Effect: Allow
              Action:
                - kinesis:GetRecords
                - kinesis:GetShardIterator
                - kinesis:DescribeStream
              Resource: !GetAtt EventStream.Arn

      Events:
        KinesisStream:
          Type: Kinesis
          Properties:
            Stream: !GetAtt EventStream.Arn
            StartingPosition: LATEST
            BatchSize: 100
            MaximumBatchingWindowInSeconds: 1
            BisectBatchOnFunctionError: true

# ─────────────────────────────────────────────
# 📊 Metrics Lambda (Dashboard API)
# ─────────────────────────────────────────────
  MetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: metrics.lambdaHandler
      Runtime: nodejs18.x
      MemorySize: 512
      Timeout: 10

      Environment:
        Variables:
          TABLE_NAME: !Ref MetricsTable
          DIM_TABLE: !Ref DimensionsTable

      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MetricsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DimensionsTable

      Events:
        Api:
          Type: Api
          Properties:
            Path: /metrics
            Method: GET

# ─────────────────────────────────────────────
# 🗄️ Metrics Table (AGGREGATED COUNTS)
# ─────────────────────────────────────────────
  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: event-metrics-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

# ─────────────────────────────────────────────
# 🗄️ Dimensions Table (GEO / USER / DEVICE)
# ─────────────────────────────────────────────
  DimensionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: event-dimensions-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

# ─────────────────────────────────────────────
# 📦 S3 Bucket (RAW EVENTS BACKUP) ✅ FIX ADDED
# ─────────────────────────────────────────────
  EventStorageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

# ─────────────────────────────────────────────
# 🌐 OUTPUTS
# ─────────────────────────────────────────────
Outputs:
  EventsApi:
    Description: "POST events"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/events"

  MetricsApi:
    Description: "GET dashboard metrics"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/metrics"