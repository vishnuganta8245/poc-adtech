AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Event Pipeline (FINAL - 2 TABLE ARCHITECTURE)
Globals:
  Api:
    Cors:
      AllowMethods: '''GET,POST,OPTIONS'''
      AllowHeaders: '''Content-Type'''
      AllowOrigin: '''*'''
Resources:
  EventStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: event-stream
      StreamModeDetails:
        StreamMode: ON_DEMAND
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ProducerFunction
      Handler: producer.handler
      Runtime: nodejs18.x
      MemorySize: 512
      Timeout: 10
      Environment:
        Variables:
          STREAM_NAME:
            Ref: EventStream
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - kinesis:PutRecords
          Resource:
            Fn::GetAtt:
            - EventStream
            - Arn
      Events:
        Api:
          Type: Api
          Properties:
            Path: /events
            Method: POST
    Metadata:
      SamResourceId: ProducerFunction
  EventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: EventFunction
      Handler: app.lambdaHandler
      Runtime: nodejs18.x
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME:
            Ref: MetricsTable
          DIM_TABLE:
            Ref: DimensionsTable
          BUCKET_NAME:
            Ref: EventStorageBucket
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: MetricsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: DimensionsTable
      - S3CrudPolicy:
          BucketName:
            Ref: EventStorageBucket
      - Statement:
        - Effect: Allow
          Action:
          - kinesis:GetRecords
          - kinesis:GetShardIterator
          - kinesis:DescribeStream
          Resource:
            Fn::GetAtt:
            - EventStream
            - Arn
      Events:
        KinesisStream:
          Type: Kinesis
          Properties:
            Stream:
              Fn::GetAtt:
              - EventStream
              - Arn
            StartingPosition: LATEST
            BatchSize: 100
            MaximumBatchingWindowInSeconds: 1
            BisectBatchOnFunctionError: true
    Metadata:
      SamResourceId: EventFunction
  MetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: MetricsFunction
      Handler: metrics.lambdaHandler
      Runtime: nodejs18.x
      MemorySize: 512
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME:
            Ref: MetricsTable
          DIM_TABLE:
            Ref: DimensionsTable
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: MetricsTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: DimensionsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /metrics
            Method: GET
    Metadata:
      SamResourceId: MetricsFunction
  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: event-metrics-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: pk
        AttributeType: S
      - AttributeName: sk
        AttributeType: S
      KeySchema:
      - AttributeName: pk
        KeyType: HASH
      - AttributeName: sk
        KeyType: RANGE
  DimensionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: event-dimensions-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: pk
        AttributeType: S
      - AttributeName: sk
        AttributeType: S
      KeySchema:
      - AttributeName: pk
        KeyType: HASH
      - AttributeName: sk
        KeyType: RANGE
  EventStorageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
Outputs:
  EventsApi:
    Description: POST events
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/events
  MetricsApi:
    Description: GET dashboard metrics
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/metrics
